<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780">
  <title>Player — matches in-app structure (dark + neon)</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#12161e"/>
      <stop offset="100%" style="stop-color:#0f1218"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="360" height="780" fill="url(#bg)"/>

  <!-- App header (outside scaled inner in real app; shown here for parity with screenshot) -->
  <rect x="0" y="0" width="360" height="52" fill="#1a1a1a"/>
  <text x="14" y="22" fill="#00ff88" font-family="system-ui,sans-serif" font-size="11" font-weight="700">✦</text>
  <text x="34" y="24" fill="#00ff88" font-family="system-ui,sans-serif" font-size="13" font-weight="800">TEMPO – Music Bingo</text>
  <text x="248" y="24" fill="#b3b3b3" font-family="system-ui,sans-serif" font-size="9" font-style="italic">by Liquid Kourage</text>

  <!-- player-chrome (scaled canvas content starts conceptually below header padding in CSS) -->
  <g transform="translate(0, 58)">
    <rect x="10" y="0" width="340" height="102" rx="10" fill="rgba(48,54,66,0.94)" stroke="#00ff8855" stroke-width="1" filter="url(#glow)"/>
    <line x1="10" y1="34" x2="350" y2="34" stroke="#ffffff14"/>
    <text x="20" y="22" fill="#ddd" font-family="system-ui,sans-serif" font-size="13" font-weight="600">👤 PlayerName…</text>
    <rect x="268" y="8" width="72" height="22" rx="11" fill="rgba(0,128,0,0.12)" stroke="#ffffff26"/>
    <circle cx="278" cy="19" r="3" fill="#1DB954"/>
    <text x="286" y="23" fill="#c8cdd3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Resync</text>
    <line x1="10" y1="58" x2="350" y2="58" stroke="#ffffff14"/>
    <text x="20" y="50" fill="#9aa0a6" font-family="system-ui,sans-serif" font-size="11">1 players · 1 played</text>
    <line x1="10" y1="74" x2="350" y2="74" stroke="#ffffff14"/>
    <text x="20" y="92" fill="#8f96a0" font-family="system-ui,sans-serif" font-size="9" font-weight="700">DISPLAY</text>
    <text x="78" y="92" fill="#8f96a0" font-family="system-ui,sans-serif" font-size="10">Title</text>
    <rect x="118" y="80" width="36" height="18" rx="9" fill="#444"/>
    <circle cx="128" cy="89" r="7" fill="#fff"/>
    <text x="168" y="92" fill="#8f96a0" font-family="system-ui,sans-serif" font-size="9" font-weight="700">TEXT</text>
    <text x="210" y="92" fill="#7a8088" font-family="system-ui,sans-serif" font-size="9">Locked</text>
    <text x="268" y="92" fill="#b3b3b3" font-family="system-ui,sans-serif" font-size="10" font-weight="600">100%</text>
  </g>

  <!-- Main: often reads as empty when card measure is late / clipped; optional 5x5 state in caption -->
  <text x="14" y="200" fill="#5a6068" font-family="system-ui,sans-serif" font-size="8">.player-content · .bingo-section-slot</text>
  <rect x="14" y="210" width="332" height="380" rx="8" fill="#0f1218" stroke="#ffffff0d"/>
  <text x="24" y="238" fill="#6a7078" font-family="system-ui,sans-serif" font-size="9">Bingo card area (5×5 when sized)</text>
  <circle cx="180" cy="280" r="3" fill="#00ff88" opacity="0.9"/>

  <!-- FAB: reads as semicircle when clipped by viewport / safe area -->
  <path d="M 96 780 A 84 84 0 0 1 264 780 Z" fill="#444" stroke="#666" stroke-width="2"/>
  <text x="180" y="748" fill="#ccc" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="900">No Pattern</text>
  <circle cx="180" cy="636" r="4" fill="#00ff88"/>

  <text x="10" y="772" fill="#6a7078" font-family="system-ui,sans-serif" font-size="7">Logical 360×780 · scaled to device · FAB position:absolute bottom:20 (may clip)</text>
</svg>
